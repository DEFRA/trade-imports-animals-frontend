version: '3.4'
services:

  localstack:
    image: localstack/localstack:3.0.2
    ports:
      - '4566:4566' # LocalStack Gateway
      - '4510-4559:4510-4559' # external services port range
    env_file:
      - 'compose/aws.env'
    environment:
      DEBUG: ${DEBUG:-1}
      LS_LOG: WARN # Localstack DEBUG Level
      SERVICES: s3,sqs,sns,firehose
      LOCALSTACK_HOST: 127.0.0.1
    volumes:
      - '${TMPDIR:-/tmp}/localstack:/var/lib/localstack'
      - ./compose/start-localstack.sh:/etc/localstack/init/ready.d/start-localstack.sh
    healthcheck:
      test: ['CMD', 'curl', 'localhost:4566']
      interval: 5s
      start_period: 5s
      retries: 3
    networks:
      - cdp-tenant

  redis:
    image: redis:7.2.3-alpine3.18
    ports:
      - '6379:6379'
    restart: always
    networks:
      - cdp-tenant

  mongodb:
    image: mongo:6.0.13
    networks:
      - cdp-tenant
    ports:
      - '27017:27017'
    volumes:
      - mongodb-data:/data
    restart: always

  trade-imports-defra-id-stub:
    image: defradigital/trade-imports-defra-id-stub
    ports:
      - '3007:3007'
    environment:
      port: 3007
      AUTH_PASSWORD: ${AUTH_PASSWORD}
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:3007/health" ]
      interval: 1m30s
      timeout: 30s
      retries: 5
      start_period: 3s
    networks:
      - cdp-tenant

  trade-imports-stub:
    image: defradigital/trade-imports-stub:latest
    ports:
      - '8087:8087'
    depends_on:
      mongodb:
        condition: service_started
    environment:
      PORT: 8087
      SPRING_PROFILES_ACTIVE: local
      MONGO_URI: mongodb://mongodb:27017
      MONGO_DATABASE: trade-imports-stub
      AWS_REGION: eu-west-2
      AWS_EMF_AGENT_ENDPOINT: http://localstack:4566
      LOG_LEVEL: INFO
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8087/health" ]
      interval: 5s
      start_period: 30s
      retries: 10
    networks:
      - cdp-tenant

  trade-imports-reference-data:
    image: defradigital/trade-imports-reference-data:latest
    ports:
      - '8086:8086'
    depends_on:
      mongodb:
        condition: service_started
      trade-imports-stub:
        condition: service_healthy
    environment:
      PORT: 8086
      SPRING_PROFILES_ACTIVE: local
      MONGO_URI: mongodb://mongodb:27017
      MONGO_DATABASE: trade-imports-reference-data
      AWS_REGION: eu-west-2
      AWS_EMF_AGENT_ENDPOINT: http://localstack:4566
      MDM_SERVICE_URL: http://trade-imports-stub:8087
      TRADE_PLATFORM_AUTH_URL: http://trade-imports-stub:8087/tenant/oauth2/v2.0/token
      TRADE_PLATFORM_CLIENT_ID: local-dev
      TRADE_PLATFORM_CLIENT_SECRET: local-dev
      TRADE_PLATFORM_SCOPE: local
      TRADE_PLATFORM_SUBSCRIPTION_KEY: local-dev
      LOG_LEVEL: INFO
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8086/health" ]
      interval: 5s
      start_period: 30s
      retries: 10
    networks:
      - cdp-tenant

################################################################################

  trade-imports-animals-frontend:
    build:
      context: .
    ports:
      - '3000:3000'
    links:
      - 'localstack:localstack'
      - 'redis:redis'
    depends_on:
      localstack:
        condition: service_healthy
      redis:
        condition: service_started
      trade-imports-defra-id-stub:
        condition: service_healthy
      trade-imports-reference-data:
        condition: service_healthy
    env_file:
      - 'compose/aws.env'
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      PORT: 3000
      NODE_ENV: development
      REDIS_HOST: redis
      LOCALSTACK_ENDPOINT: http://localstack:4566
      USE_SINGLE_INSTANCE_CACHE: true
      TRADE_IMPORTS_REFERENCE_DATA_URL: http://trade-imports-reference-data:8086
      # OIDC discovery URL must be reachable from inside the container.
      DEFRA_ID_SIGN_OUT_HOSTNAME_REWRITE_ENABLED: ${DEFRA_ID_SIGN_OUT_HOSTNAME_REWRITE_ENABLED}
      DEFRA_ID_SIGN_OUT_HOSTNAME_REWRITE_TO: ${DEFRA_ID_SIGN_OUT_HOSTNAME_REWRITE_TO}
      DEFRA_ID_OIDC_CONFIGURATION_URL: ${DEFRA_ID_OIDC_CONFIGURATION_URL}
      DEFRA_ID_REDIRECT_URL: http://localhost:3000/auth/sign-in-oidc
      DEFRA_ID_SIGN_OUT_REDIRECT_URL: http://localhost:3000/auth/sign-out-oidc
    networks:
      - cdp-tenant

  # your-backend:
  #   image: defradigital/your-backend:${YOUR_BACKEND_VERSION:-latest}
  #   ports:
  #     - '3555:3555'
  #   links:
  #     - 'localstack:localstack'
  #     - 'mongodb:mongodb'
  #   depends_on:
  #     localstack:
  #       condition: service_healthy
  #     mongodb:
  #       condition: service_started
  #   env_file:
  #     - 'compose/aws.env'
  #   environment:
  #     PORT: 3555
  #     NODE_ENV: development
  #     LOCALSTACK_ENDPOINT: http://localstack:4566
  #   networks:
  #     - cdp-tenant

################################################################################

volumes:
  mongodb-data:

networks:
  cdp-tenant:
    driver: bridge
