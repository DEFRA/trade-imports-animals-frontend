name: E2E Tests

on:
  workflow_run:
    workflows: ["Publish"]
    types: [completed]
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch name to probe for service images (defaults to main)'
        required: false
        type: string

concurrency:
  group: e2e-main
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  e2e:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push' &&
       github.event.workflow_run.head_branch == 'main')
    uses: DEFRA/trade-imports-animals-workspace/.github/workflows/e2e-tests.yml@main
    with:
      branch: ${{ inputs.branch || github.event.workflow_run.head_branch || 'main' }}
    secrets: inherit
