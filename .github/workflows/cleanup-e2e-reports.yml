name: Cleanup E2E Reports

on:
  pull_request:
    types: [closed]
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'truncate to orphan-reset gh-pages history; empty for default stale cleanup'
        required: false
        type: string
        default: ''

permissions:
  contents: write

jobs:
  cleanup:
    uses: DEFRA/trade-imports-animals-workspace/.github/workflows/cleanup-e2e-reports.yml@main
    with:
      head-ref: ${{ github.head_ref || '' }}
      mode: ${{ inputs.mode || '' }}
